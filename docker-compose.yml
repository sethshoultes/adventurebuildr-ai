services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: adventurebuildr
      POSTGRES_PASSWORD: adventurebuildr_secret
      POSTGRES_DB: adventurebuildr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adventurebuildr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment below once Clerk keys are configured in .env
  # app:
